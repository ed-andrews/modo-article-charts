<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Over 20 GW of AR4+ capacity is expected live under the negative price clause by 2030</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #333333;
    }

    .chart-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 24px 24px 16px 24px;
    }

    /* === HEADER === */
    .chart-header {
      margin-bottom: 2px;
    }
    .chart-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px;
      font-weight: 400;          /* Regular weight by default */
      line-height: 1.3;
      color: #333333;
      margin: 0;
    }
    .chart-header h1 b {
      font-weight: 700;          /* Only <b> wrapped words are bold */
    }
    .chart-subheader {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #4a4a4a;
      margin-top: 6px;
      line-height: 1.3;
    }

    /* === CHART === */
    #chart {
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    /* === FOOTER === */
    .chart-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 10px;
      gap: 16px;
    }
    .chart-footer-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }
    .chart-source {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #AAAAAA;
      line-height: 1.4;
    }
    .chart-note {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #AAAAAA;
      line-height: 1.4;
    }
    .chart-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;           /* Doubled from 11px */
      font-weight: 700;
      color: #333333;
      letter-spacing: 0.25em;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="chart-wrapper">
    <!-- Header: regular weight (no bold by default; only use <b> if user requests it) -->
    <div class="chart-header">
      <h1>Over <b>20 GW</b> of AR4+ capacity is expected live under the negative price clause by 2030</h1>
      <div class="chart-subheader">Cumulative contracted capacity reaching operation (GW), AR4 to AR7</div>
    </div>

    <!-- Plotly chart area -->
    <div id="chart"></div>

    <!-- Footer: source + notes on left, wordmark on right -->
    <div class="chart-footer">
      <div class="chart-footer-left">
        <div class="chart-source">Source: LCCC CfD Register (March 2026), Modo Energy</div>
        
      </div>
      <div class="chart-wordmark">MODOENERGY</div>
    </div>
  </div>

  <script>
    // ===== DATA =====
    
const data = [
  {x:[2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032], y:[0.3, 1.5, 4.2, 8.8, 15.2, 20.8, 24.5, 27.1],
   type:'scatter', mode:'lines', name:'Solar PV',
   fill:'tozeroy', fillcolor:'rgba(247,193,145,0.7)',
   line:{color:'#f7c191', width:0, shape:'spline'},
   stackgroup:'one',
   hovertemplate:'%{y:.1f} GW<extra>Solar PV</extra>'},
  {x:[2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032], y:[0.1, 0.8, 3.8, 13.5, 24.2, 30.8, 35.2, 38.4],
   type:'scatter', mode:'lines', name:'Offshore wind',
   fill:'tonexty', fillcolor:'rgba(70,126,228,0.7)',
   line:{color:'#467ee4', width:0, shape:'spline'},
   stackgroup:'one',
   hovertemplate:'%{y:.1f} GW<extra>Offshore wind</extra>'},
  {x:[2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032], y:[0.05, 0.3, 1.2, 3.5, 5.8, 7.2, 8.1, 9.0],
   type:'scatter', mode:'lines', name:'Onshore wind',
   fill:'tonexty', fillcolor:'rgba(39,172,96,0.7)',
   line:{color:'#27ac60', width:0, shape:'spline'},
   stackgroup:'one',
   hovertemplate:'%{y:.1f} GW<extra>Onshore wind</extra>'},
];

    // ===== LAYOUT =====
    const layout = {"font": {"family": "\"DM Sans\", sans-serif", "color": "#4a4a4a", "size": 12}, "paper_bgcolor": "rgba(0,0,0,0)", "plot_bgcolor": "rgba(0,0,0,0)", "margin": {"t": 10, "r": 20, "b": 40, "l": 0, "pad": 0}, "xaxis": {"showgrid": false, "showline": false, "automargin": true, "tickfont": {"size": 12, "color": "#4a4a4a", "family": "\"DM Sans\", sans-serif"}, "tickcolor": "rgba(0,0,0,0)", "tickmode": "array", "tickvals": [2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032], "ticktext": ["2025", "2026", "2027", "2028", "2029", "2030", "2031", "2032"]}, "yaxis": {"showgrid": true, "gridcolor": "#E8E8E8", "gridwidth": 1, "showline": false, "automargin": true, "zeroline": true, "zerolinecolor": "#D0D0D0", "zerolinewidth": 1, "tickfont": {"size": 12, "color": "#4a4a4a", "family": "\"DM Sans\", sans-serif"}, "tickcolor": "rgba(0,0,0,0)", "title": {"text": "GW", "font": {"size": 11}}, "ticksuffix": " GW", "range": [0, 80]}, "legend": {"orientation": "h", "yanchor": "bottom", "y": 1.02, "xanchor": "left", "x": 0, "font": {"size": 13, "color": "#4a4a4a", "family": "\"DM Sans\", sans-serif"}, "bgcolor": "rgba(255,255,255,0)", "borderwidth": 0, "itemsizing": "constant"}, "hovermode": "x unified", "hoverlabel": {"bgcolor": "#333333", "font": {"family": "\"DM Sans\", sans-serif", "size": 13, "color": "#FFFFFF"}, "bordercolor": "#333333"}};

    // ===== RENDER =====
    Plotly.newPlot('chart', data, layout, {
      responsive: true,
      displayModeBar: false,
      staticPlot: false,
    });

    window.addEventListener('resize', () => {
      Plotly.Plots.resize('chart');
    });
  </script>
</body>
</html>
